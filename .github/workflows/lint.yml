name: Lint

on:
  workflow_call:

jobs:
  lint:
    name: Flake8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: backend/requirements.dev.txt

      - name: Install flake8
        run: pip install "flake8>=4.0.1,<4.1"

      - name: Run flake8
        working-directory: backend
        run: flake8
