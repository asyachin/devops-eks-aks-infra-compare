enable-builtin-rules: true

rules:
  - id: generic-api-key
    category: general
    title: Generic API Key
    severity: CRITICAL
    regex: (?i)(api[_-]?key|apikey|api[_-]?secret)\s*[:=]\s*["']?([A-Za-z0-9+/]{16,})["']?
    path: ""
    allow-rules: []

  - id: generic-password
    category: general
    title: Generic Password in config
    severity: HIGH
    regex: (?i)(password|passwd|pwd)\s*[:=]\s*["']?([^\s"']{8,})["']?
    path: ""
    allow-rules: []
